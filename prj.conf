#
#
#

# So that we have some floating point support.
CONFIG_NEWLIB_LIBC=y

#CONFIG_USB_DEVICE_STACK=y
#CONFIG_USB_DEVICE_PRODUCT="Remote ID"
#CONFIG_USB_DEVICE_LOG_LEVEL_ERR=n
# 
#CONFIG_USB_DEVICE_VID=0x2fe3
#CONFIG_USB_DEVICE_PID=0x0004
# Emulate an FTDI.
# CONFIG_USB_DEVICE_VID=0x0403
# CONFIG_USB_DEVICE_PID=0x6001

CONFIG_LOG=n
# CONFIG_LOG_MODE_MINIMAL=y

CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_UART_LINE_CTRL=y
CONFIG_UART_USE_RUNTIME_CONFIGURE=y
CONFIG_STDOUT_CONSOLE=y

CONFIG_BT=y
CONFIG_BT_PERIPHERAL=n
CONFIG_BT_BROADCASTER=y
CONFIG_BT_OBSERVER=y
# CONFIG_BT_DEBUG_LOG=n

CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
# CONFIG_BT_CTLR_TX_PWR_DYNAMIC_CONTROL=y

CONFIG_BT_EXT_ADV=y
CONFIG_BT_EXT_ADV_MAX_ADV_SET=3
# CONFIG_BT_CTLR=y
CONFIG_BT_CTLR_PHY_2M=n
CONFIG_BT_CTLR_PHY_CODED=y
CONFIG_BT_CTLR_ADV_EXT=y
# For message pack.
CONFIG_BT_CTLR_ADV_DATA_LEN_MAX=255

# For IDs with crypto auth.
#CONFIG_MBEDTLS_BUILTIN=y
#CONFIG_MBEDTLS_CFG_FILE="config-tls-generic.h"
#CONFIG_MBEDTLS_CIPHER_AES_ENABLED=y
#CONFIG_MBEDTLS_CIPHER_CCM_ENABLED=y
#CONFIG_MBEDTLS_CIPHER_MODE_CBC_ENABLED=y
#CONFIG_MBEDTLS_CIPHER=y
#CONFIG_MBEDTLS_MD=y
#CONFIG_CRYPTO=y
#CONFIG_CRYPTO_MBEDTLS_SHIM=y

#
CONFIG_FP16=y

# For reading the battery voltage.
CONFIG_ADC=y

# For the I2C slave.
# CONFIG_NRFX_TWIS1=y
CONFIG_STATIC_INIT_GNU=y


# PSA Crypto Ed25519 - nRF Security
CONFIG_NRF_SECURITY=y
CONFIG_PSA_CRYPTO_DRIVER_OBERON=y
CONFIG_PSA_WANT_ALG_PURE_EDDSA=y
CONFIG_PSA_WANT_KEY_TYPE_ECC_KEY_PAIR_IMPORT=y
CONFIG_PSA_WANT_ECC_TWISTED_EDWARDS_255=y

# Generate the drone signing key ON-DEVICE (not imported/hardcoded) and export only its public
# part. Ed25519 signing hashes with SHA-512 internally.
CONFIG_PSA_WANT_KEY_TYPE_ECC_KEY_PAIR_GENERATE=y
CONFIG_PSA_WANT_KEY_TYPE_ECC_PUBLIC_KEY=y
CONFIG_PSA_WANT_ALG_SHA_512=y
CONFIG_PSA_WANT_GENERATE_RANDOM=y

# --- Persistent PSA key storage (secure) --------------------------------------------------
# Makes the generated private key persist across reboots in encrypted storage, so it lives in
# secure storage instead of the firmware image. This block is the version-sensitive part of the
# nRF Connect SDK; adjust to match the `crypto/persistent_key_usage` sample of YOUR NCS version.
CONFIG_TRUSTED_STORAGE=y
CONFIG_HW_UNIQUE_KEY=y
CONFIG_HW_UNIQUE_KEY_RANDOM=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS=y
CONFIG_MPU_ALLOW_FLASH_WRITE=y


CONFIG_HEAP_MEM_POOL_SIZE=16384
CONFIG_MBEDTLS_ENABLE_HEAP=y
CONFIG_MBEDTLS_HEAP_SIZE=8192


CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096